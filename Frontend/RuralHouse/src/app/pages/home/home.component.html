<!-- Sección de filtros -->
<div class="w-full max-w-7xl mx-auto px-4 py-4">
  <div class="mb-6">
    <label
      for="provincia-filter"
      class="block text-sm font-semibold text-gray-700 mb-2"
    >
      Buscar por provincia
    </label>
    <div class="relative max-w-md">
      <input
        id="provincia-filter"
        type="text"
        placeholder="Escribe el nombre de la provincia..."
        class="w-full cursor-pointer px-5 py-3 pl-12 border border-gray-300 rounded-xl shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-gray-800 placeholder-gray-400"
        [value]="provinciaFilter()"
        (input)="onProvinciaFilterChange($any($event.target).value)"
      />
      <svg
        class="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 w-5 h-5 pointer-events-none"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M21 21l-4.35-4.35M16.65 16.65A7.5 7.5 0 1118 9a7.5 7.5 0 01-1.35 7.65z"
        />
      </svg>
    </div>

    <!-- Mostrar el número de resultados -->
    <p class="mt-2 text-sm text-gray-600">
      @if (provinciaFilter()) { Mostrando {{ filteredHouses().length }} casa(s)
      en "{{ provinciaFilter() }}" } @else { Mostrando
      {{ filteredHouses().length }} casa(s) en total }
    </p>
  </div>
</div>

<!-- Lista de casas filtradas -->
<app-house-list [houses]="filteredHouses()" />
