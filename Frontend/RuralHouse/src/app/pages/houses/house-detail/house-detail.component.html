<ng-container>
  <div class="house-card">
    <div class="house-image">Aqui en un futuro habra una imagen</div>
    <div class="house-info">
      <!-- Concatenar la URL base del servidor con la ruta de la imagen -->
      <!--  <img
        [src]="'http://127.0.0.1:8001/storage/' + house().photo_path"
        [alt]="house().name"
      /> -->
      <p class="house-description">
        {{ house().name }}
        {{ house().description.length > 100 ? "..." : "" }}
      </p>
      <span
        class="btn btn-blue mr-2 text-xl"
        (click)="mostrarFormularioAlquiler()"
        >Alquilar</span
      >

      @if (showRentalForm && usuarioActual() && usuarioActual().id && usuarioActual().name) {
      <app-house-form [user]="usuarioActual()" [house]="house()"></app-house-form>
      }
    </div>
  </div>
</ng-container>
