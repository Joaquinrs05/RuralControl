<div
  class="fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center z-50"
>
  <div class="bg-white p-6 rounded-lg shadow-xl w-11/12 max-w-md z-50 relative">
    <h2 class="text-2xl font-bold mb-4">Reserva para {{ house().name }}</h2>
    <p class="text-gray-600 mb-4">
      <strong>Características:</strong> {{ house().description }}
    </p>

    <h3 class="text-xl font-semibold mb-2">Datos del usuario</h3>
    <p class="text-gray-600 mb-2">Nombre: {{ user().name }}</p>
    <p class="text-gray-600 mb-4">Email: {{ user().email }}</p>

    <form
      [formGroup]="reservaForm"
      (ngSubmit)="onSubmit()"
      novalidate
      class="space-y-4"
    >
      <div>
        <label
          class="block text-sm font-medium text-gray-700 mb-1"
          for="fecha_inicio"
          >Fecha de inicio:</label
        >
        <input
          id="fecha_inicio"
          type="date"
          formControlName="fecha_inicio"
          required
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <div>
        <label
          class="block text-sm font-medium text-gray-700 mb-1"
          for="fecha_fin"
          >Fecha de fin:</label
        >
        <input
          id="fecha_fin"
          type="date"
          formControlName="fecha_fin"
          required
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <div>
        <label
          class="block text-sm font-medium text-gray-700 mb-1"
          for="num_personas"
          >Número de personas:</label
        >
        <input
          id="num_personas"
          type="number"
          formControlName="num_personas"
          min="1"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <button
        type="submit"
        class="w-full px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:bg-gray-400 disabled:cursor-not-allowed"
        [disabled]="reservaForm.invalid"
      >
        Enviar reserva
      </button>
    </form>
    <button
      type="button"
      class="absolute top-4 right-4 text-gray-400 hover:text-gray-600"
      (click)="cerrarModal()"
      aria-label="Cerrar modal"
    >
      X
    </button>
  </div>
</div>
