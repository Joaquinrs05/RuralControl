<div
  class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"
>
  <div
    class="bg-[#fefcf9] p-8 rounded-2xl shadow-2xl w-11/12 max-w-xl relative border border-[#e5e3dc]"
  >
    <button
      type="button"
      class="absolute top-4 right-4 text-[#888] hover:text-[#444] text-2xl font-bold"
      (click)="cerrarModal()"
      aria-label="Cerrar modal"
    >
      &times;
    </button>

    <h2 class="text-3xl font-semibold text-[#2f3e2f] mb-2">Reserva en</h2>
    <h3 class="text-xl font-bold text-[#4d5c41] mb-4">{{ house().name }}</h3>

    <!-- Descripción de la casa -->
    <p class="text-[#555] italic mb-6 border-l-4 border-[#a3b18a] pl-4">
      {{ house().description }}
    </p>

    <!-- Datos del usuario -->
    <div class="mb-6">
      <h4 class="text-lg font-semibold text-[#4d5c41] mb-1">Tus datos</h4>
      <p class="text-sm text-[#444]">👤 {{ user().name }}</p>
      <p class="text-sm text-[#444]">📧 {{ user().email }}</p>
    </div>

    <!-- Formulario -->
    <form [formGroup]="reservaForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label
            for="start_date"
            class="block text-sm font-medium text-[#374151] mb-1"
            >Fecha de inicio</label
          >
          <input
            id="start_date"
            type="date"
            formControlName="start_date"
            class="w-full px-3 py-2 border border-[#d6d3cd] rounded-lg focus:outline-none focus:ring-2 focus:ring-[#a3b18a]"
            required
          />
        </div>

        <div>
          <label
            for="end_date"
            class="block text-sm font-medium text-[#374151] mb-1"
            >Fecha de fin</label
          >
          <input
            id="end_date"
            type="date"
            formControlName="end_date"
            class="w-full px-3 py-2 border border-[#d6d3cd] rounded-lg focus:outline-none focus:ring-2 focus:ring-[#a3b18a]"
            required
          />
        </div>
      </div>

      <div>
        <label
          for="num_people"
          class="block text-sm font-medium text-[#374151] mb-1"
          >Número de personas</label
        >
        <input
          id="num_people"
          type="number"
          min="1"
          formControlName="num_people"
          class="w-full px-3 py-2 border border-[#d6d3cd] rounded-lg focus:outline-none focus:ring-2 focus:ring-[#a3b18a]"
        />
      </div>

      <div class="mt-4">
        <p class="text-sm text-[#374151]">
          💶 <strong>Precio por noche:</strong> {{ house().price_per_night }} €
        </p>
        <p class="text-sm text-[#374151]">
          🌙 <strong>Noches:</strong> {{ totalNights }}
        </p>
        <p class="text-md font-bold text-[#283618]">
          🧾 Estimación total: {{ estimatedTotal | currency : "EUR" }}
        </p>
      </div>

      <button
        type="submit"
        class="w-full bg-[#6b8f71] hover:bg-[#527a5c] text-white py-2 rounded-lg transition duration-200 disabled:bg-gray-400 disabled:cursor-not-allowed mt-4"
        [disabled]="reservaForm.invalid"
      >
        Confirmar reserva
      </button>
    </form>
  </div>
</div>
