<div
  class="bg-white rounded-2xl shadow-md hover:shadow-xl transition-all duration-300 overflow-hidden w-72 h-full mx-auto flex flex-col justify-between"
>
  <div class="flex flex-col items-center text-center p-4 gap-4">
    <img
      [src]="'http://127.0.0.1:8001/' + house().photo_path"
      [alt]="house().name"
      class="w-full h-40 object-cover rounded-xl"
    />
    <h3 class="text-lg font-bold text-gray-800 line-clamp-2">
      {{ house().name }}
    </h3>
  </div>

  <div class="flex justify-center p-4">
    <span
      class="bg-blue-600 text-white px-6 py-2 rounded-xl text-base shadow hover:bg-blue-700 transition cursor-pointer"
      [routerLink]="['/house', house().id]"
    >
      Mas información
    </span>
  </div>
</div>
