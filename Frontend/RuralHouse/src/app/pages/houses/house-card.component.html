<ng-container *ngIf="house; else listTemplate">
  <div class="house-card">
    <div class="house-image">
      <!-- Concatenar la URL base del servidor con la ruta de la imagen -->
      <img
        [src]="'http://127.0.0.1:8001/storage/' + house.photo_path"
        [alt]="house.name"
      />
    </div>
    <div class="house-info">
      <h3 class="house-title">{{ house.name }}</h3>
      <p class="house-description">
        {{ house.description | slice : 0 : 100
        }}{{ house.description.length > 100 ? "..." : "" }}
      </p>
    </div>
  </div>
</ng-container>
<ng-template #listTemplate>
  <div class="houses-grid">
    <div *ngFor="let house of houses$ | async" class="house-card">
      <div class="house-image">
        <!-- Concatenar la URL base del servidor con la ruta de la imagen -->
        <img
          [src]="'http://127.0.0.1:8001/storage/' + house.photo_path"
          [alt]="house.name"
        />
      </div>
      <div class="house-info">
        <h3 class="house-title">{{ house.name }}</h3>
        <p class="house-description">
          {{ house.description | slice : 0 : 100
          }}{{ house.description.length > 100 ? "..." : "" }}
        </p>
      </div>
    </div>
  </div>
</ng-template>
