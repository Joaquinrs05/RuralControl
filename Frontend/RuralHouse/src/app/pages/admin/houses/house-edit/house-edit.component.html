<div class="bg-white shadow-lg rounded-xl p-6 max-w-lg mx-auto mt-6">
  <h2 class="text-2xl font-semibold text-gray-800 mb-4">Editar Casa</h2>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="mb-4">
      <label class="block text-gray-700 font-medium mb-1">Nombre</label>
      <input
        type="text"
        formControlName="name"
        class="w-full p-2 border border-gray-300 rounded-lg"
      />
    </div>

    <div class="mb-4">
      <label class="block text-gray-700 font-medium mb-1">Descripción</label>
      <textarea
        formControlName="description"
        rows="4"
        class="w-full p-2 border border-gray-300 rounded-lg"
      ></textarea>
    </div>

    <div class="mb-4">
      <label class="block text-gray-700 font-medium mb-1"
        >Precio por noche (€)</label
      >
      <input
        type="number"
        formControlName="price_per_night"
        class="w-full p-2 border border-gray-300 rounded-lg"
      />
    </div>

    <div class="flex justify-end gap-4 mt-6">
      <button
        type="button"
        (click)="cancelar()"
        class="bg-gray-400 hover:bg-gray-500 text-white px-4 py-2 rounded-lg"
      >
        Cancelar
      </button>
      <button
        type="submit"
        class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg"
        [disabled]="form.invalid"
      >
        Guardar
      </button>
    </div>
  </form>
</div>
