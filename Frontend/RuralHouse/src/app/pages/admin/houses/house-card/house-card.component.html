<div
  class="bg-white rounded-3xl shadow-lg hover:shadow-2xl p-0 my-6 max-w-[350px] transition-all duration-300 hover:scale-105 overflow-hidden border border-gray-100 h-[450px] flex flex-col group"
>
  <div class="relative overflow-hidden">
    <img
      [src]="'http://127.0.0.1:8001/' + house().photo_path"
      [alt]="house().name"
      class="w-full h-48 object-cover transition-transform duration-300"
    />
    <div
      class="absolute top-4 right-4 bg-green-500 text-white px-3 py-1 rounded-full text-sm font-medium shadow-lg"
    >
      Disponible
    </div>
  </div>

  <!-- Contenido de la carta -->
  <div class="flex flex-col flex-1 p-6">
    <div class="h-16 flex items-center justify-center mb-4">
      <h3
        class="text-xl font-bold text-gray-800 text-center line-clamp-2 leading-tight group-hover:text-green-700 transition-colors duration-200"
      >
        {{ house().name }}
      </h3>
    </div>

    <div class="flex items-center justify-center gap-4 mb-6 text-gray-600">
      <div class="flex items-center gap-1">
        <span class="text-sm font-medium">
          <i class="fa fa-home" aria-hidden="true"></i> Casa Rural</span
        >
      </div>
    </div>

    <div class="flex items-center justify-center w-full gap-3 mt-auto">
      <button
        (click)="mostrarFormularioEditar()"
        class="flex-1 bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white rounded-xl px-4 py-3 text-sm font-semibold cursor-pointer text-center shadow-lg hover:shadow-xl transition-all duration-200 transform flex items-center justify-center gap-2"
      >
        Editar
      </button>

      <button
        (click)="emitDelete(house().id)"
        class="flex-1 bg-gradient-to-r from-red-500 to-red-600 hover:from-red-600 hover:to-red-700 text-white rounded-xl px-4 py-3 text-sm font-semibold cursor-pointer text-center shadow-lg hover:shadow-xl transition-all duration-200 transform hover:-translate-y-0.5 flex items-center justify-center gap-2"
      >
        Eliminar
      </button>
    </div>
  </div>
</div>

@if (showRentalForm) {
<div
  class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[9999] p-4"
>
  <div
    class="bg-white rounded-2xl shadow-2xl p-8 max-w-lg w-full relative transform transition-all duration-300 scale-100 max-h-[90vh] overflow-y-auto"
  >
    <app-house-edit
      [house]="house()"
      (close)="ocultarFormularioEditar()"
      (houseUpdated)="actualizarCasa($event)"
    ></app-house-edit>
  </div>
</div>
}
