<!-- formulario-crear-casa.component.html -->
<form
  [formGroup]="casaForm"
  (ngSubmit)="onSubmit()"
  enctype="multipart/form-data"
>
  <div>
    <label>Nombre:</label>
    <input formControlName="name" type="text" required />
  </div>
  <div>
    <label>Descripción:</label>
    <textarea formControlName="description" required></textarea>
  </div>
  <div>
    <label>Foto:</label>
    <input type="file" (change)="onFileChange($event)" accept="image/*" />
  </div>
  <div>
    <label>ID del propietario:</label>
    <input formControlName="owner_id" type="number" required />
  </div>
  <div>
    <label>Valoración media:</label>
    <input formControlName="average_rating" type="number" step="0.1" />
  </div>
  <button type="submit" [disabled]="casaForm.invalid">Crear Casa</button>
</form>
