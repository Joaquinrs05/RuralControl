<nb-card *ngIf="loadingStats || loadingReservations">
  <nb-spinner></nb-spinner>
  <p>Cargando estadísticas...</p>
</nb-card>

<div class="stats-cards mt-10">
  <nb-card class="stat-card primary-card">
    <nb-card-header>Total Reservas</nb-card-header>
    <nb-card-body>
      <div class="stat-number">{{ totalReservations }}</div>
    </nb-card-body>
  </nb-card>

  <nb-card class="stat-card success-card">
    <nb-card-header>Total Huéspedes</nb-card-header>
    <nb-card-body>
      <div class="stat-number">{{ totalGuests }}</div>
    </nb-card-body>
  </nb-card>

  <nb-card class="stat-card info-card">
    <nb-card-header>Total Casas</nb-card-header>
    <nb-card-body>
      <div class="stat-number">{{ totalHouses }}</div>
    </nb-card-body>
  </nb-card>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-6">
  <nb-card>
    <nb-card-header>Reservas y Huéspedes por Mes</nb-card-header>
    <nb-card-body>
      <echarts
        [options]="reservationsChartOptions"
        class="echart-bar"
      ></echarts>
    </nb-card-body>
  </nb-card>

  <nb-card *ngIf="!loadingStats && stats">
    <nb-card-header>Tasa de Ocupación</nb-card-header>
    <nb-card-body>
      <echarts [options]="occupancyChartOptions" class="echart-pie"></echarts>
    </nb-card-body>
  </nb-card>
</div>
