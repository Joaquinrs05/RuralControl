version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: users_service
      MYSQL_USER: joaquin
      MYSQL_PASSWORD: 1234
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - '3306:3306'

  user-api:
    build:
      context: ./UserApi
    container_name: UserApi
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
    volumes:
      - ./user-api:/var/www
    working_dir: /var/www
    ports:
      - '8000:8000'
    command: php artisan serve --host=0.0.0.0 --port=8000

  house-api:
    build:
      context: ./HouseApi
    container_name: HouseApi
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
    volumes:
      - ./house-api:/var/www
    working_dir: /var/www
    ports:
      - '8001:8001'
    command: php artisan serve --host=0.0.0.0 --port=8001

volumes:
  mysql_data:
